<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flower Surprise</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #fff8f0;
      font-family: sans-serif;
    }

    #loader {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 380px; gap: 20px;
    }
    .loading-title {
      font-size: 24px; font-weight: 600; color: #333; text-align: center;
    }
    .loading-sub {
      font-size: 15px; color: #777; min-height: 22px;
      text-align: center; transition: opacity 0.3s;
    }
    .dots span {
      display: inline-block; width: 12px; height: 12px;
      border-radius: 50%; margin: 0 5px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(1) { background: #d63384; animation-delay: 0s; }
    .dots span:nth-child(2) { background: #FFD700; animation-delay: 0.2s; }
    .dots span:nth-child(3) { background: #FF6B00; animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%            { transform: scale(1.3); opacity: 1; }
    }

    .pbar-wrap {
      width: 260px; height: 8px;
      background: #ffe0c0; border-radius: 4px; overflow: hidden;
    }
    .pbar-fill {
      height: 100%; width: 0%; border-radius: 4px;
      background: linear-gradient(90deg, #d63384, #FFD700, #FF6B00);
      transition: width 0.5s ease;
    }

    /* ── Reveal ── */
    #reveal { display: none; }
    .stage {
      display: flex; flex-direction: column;
      align-items: center; padding: 2rem 1rem; gap: 20px;
    }

    .headline {
      font-size: 26px; font-weight: 700; color: #333; text-align: center;
      opacity: 0; transform: translateY(-20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .headline.show { opacity: 1; transform: translateY(0); }

    .flower-row {
      display: flex; gap: 30px; justify-content: center;
      align-items: flex-end; flex-wrap: wrap;
    }

    .flower-card {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; transform: scale(0.3) rotate(-20deg);
      transition: opacity 0.8s cubic-bezier(.34,1.56,.64,1),
                  transform 0.8s cubic-bezier(.34,1.56,.64,1);
    }
    .flower-card.show { opacity: 1; transform: scale(1) rotate(0deg); }

    .flower-label {
      font-size: 14px; font-weight: 600; color: #666;
      background: #fff3e0; border: 1px solid #ffd580;
      border-radius: 20px; padding: 5px 16px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .flower-label.show { opacity: 1; transform: translateY(0); }

    .fact-box {
      background: #fff3e0; border: 1px solid #ffd580;
      border-radius: 14px; padding: 1rem 1.5rem;
      max-width: 500px; width: 100%; text-align: center;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fact-box.show { opacity: 1; transform: translateY(0); }
    .fact-box p { font-size: 15px; color: #555; line-height: 1.7; }
    .fact-box strong { color: #c0226f; }

    .petal-row {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      opacity: 0; transition: opacity 0.6s ease;
    }
    .petal-row.show { opacity: 1; }
    .petal {
      width: 16px; height: 16px; border-radius: 50% 0 50% 0;
      animation: pspin 3s linear infinite;
    }
    @keyframes pspin {
      0%   { transform: rotate(0deg)   scale(1);   }
      50%  { transform: rotate(180deg) scale(1.4); }
      100% { transform: rotate(360deg) scale(1);   }
    }
  </style>
</head>
<body>

<!-- ══ LOADING SCREEN ══ -->
<div id="loader">
  <div style="font-size:52px; animation:bounce 1.2s infinite ease-in-out; display:inline-block">🌼</div>
  <div class="loading-title">Just for you love</div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbar"></div></div>
  <div class="loading-sub" id="lmsg">Getting things ready...</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- ══ SURPRISE REVEAL ══ -->
<div id="reveal">
  <div class="stage">

    <div class="headline" id="h1">✨ For you so smile a bit ✨</div>

    <!-- Spinning petals -->
    <div class="petal-row" id="petals">
      <div class="petal" style="background:#d63384; animation-delay:0s"></div>
      <div class="petal" style="background:#FFD700; animation-delay:0.3s; border-radius:0 50% 0 50%"></div>
      <div class="petal" style="background:#FF6B00; animation-delay:0.6s"></div>
      <div class="petal" style="background:#e05a00; animation-delay:0.9s; border-radius:0 50% 0 50%"></div>
      <div class="petal" style="background:#c0226f; animation-delay:1.2s"></div>
      <div class="petal" style="background:#FFD700; animation-delay:1.5s; border-radius:0 50% 0 50%"></div>
      <div class="petal" style="background:#FF6B00; animation-delay:1.8s"></div>
      <div class="petal" style="background:#d63384; animation-delay:0.5s; border-radius:0 50% 0 50%"></div>
    </div>

    <!-- Flowers -->
    <div class="flower-row">

      <!-- Yellow Gerbera -->
      <div class="flower-card" id="f1">
        <svg width="145" height="155" viewBox="0 0 145 155" xmlns="http://www.w3.org/2000/svg">
          <line x1="72" y1="115" x2="67" y2="152" stroke="#2e8b2e" stroke-width="3.5" stroke-linecap="round"/>
          <g transform="translate(72,70)">
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(0)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(30)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(60)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(90)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(120)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(150)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(180)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(210)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(240)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(270)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFD700" transform="rotate(300)"/>
            <ellipse cx="0" cy="-36" rx="10" ry="26" fill="#FFC200" transform="rotate(330)"/>
            <circle cx="0" cy="0" r="22" fill="#E8A000" stroke="#b87a00" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="13" fill="#4cbb17"/>
          </g>
        </svg>
        <div class="flower-label" id="fl1">Yellow Gerbera(I)</div>
      </div>

      <!-- Pink Gerbera -->
      <div class="flower-card" id="f2">
        <svg width="145" height="155" viewBox="0 0 145 155" xmlns="http://www.w3.org/2000/svg">
          <line x1="72" y1="115" x2="72" y2="152" stroke="#2e8b2e" stroke-width="3.5" stroke-linecap="round"/>
          <g transform="translate(72,68)">
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(0)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(30)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(60)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(90)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(120)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(150)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(180)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(210)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(240)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(270)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#d63384" transform="rotate(300)"/>
            <ellipse cx="0" cy="-38" rx="10" ry="28" fill="#c0226f" transform="rotate(330)"/>
            <circle cx="0" cy="0" r="22" fill="#c17f00" stroke="#8b5e00" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="13" fill="#4cbb17"/>
          </g>
        </svg>
        <div class="flower-label" id="fl2">Pink Gerbera(Love)</div>
      </div>

      <!-- Orange Gerbera -->
      <div class="flower-card" id="f3">
        <svg width="145" height="155" viewBox="0 0 145 155" xmlns="http://www.w3.org/2000/svg">
          <line x1="72" y1="115" x2="77" y2="152" stroke="#2e8b2e" stroke-width="3.5" stroke-linecap="round"/>
          <g transform="translate(72,68)">
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(0)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(30)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(60)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(90)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(120)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(150)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(180)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(210)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(240)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(270)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#FF6B00" transform="rotate(300)"/>
            <ellipse cx="0" cy="-37" rx="10" ry="27" fill="#e05a00" transform="rotate(330)"/>
            <circle cx="0" cy="0" r="22" fill="#E8A000" stroke="#c17f00" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="13" fill="#4cbb17"/>
          </g>
        </svg>
        <div class="flower-label" id="fl3">Orange Gerbera(You)</div>
      </div>

    </div>

    <!-- Fun Facts -->
    <div class="fact-box" id="fact1">
      <p>🌼 <strong>Gerbera</strong> I want to spend my life
learning the little things about you</p>
    </div>

    <div class="fact-box" id="fact2">
      <p>💛 So — <strong>May I choose you?</strong> </p>
    </div>

    <div class="headline" id="h2" style="font-size:18px; margin-top:6px;">
      Hope this made you smile! 🌸
    </div>

  </div>
</div>

<script>
  var steps = [
    { msg: "Getting things ready...",       pct: 12  },
    { msg: "Gathering beautiful flowers...", pct: 30  },
    { msg: "Arranging the bouquet...",       pct: 52  },
    { msg: "Adding finishing touches...",    pct: 74  },
    { msg: "Almost ready...",               pct: 90  },
    { msg: "Here we go!",                   pct: 100 }
  ];

  var i    = 0;
  var lmsg = document.getElementById('lmsg');
  var pbar = document.getElementById('pbar');

  function nextStep() {
    if (i >= steps.length) { setTimeout(showReveal, 400); return; }
    lmsg.textContent   = steps[i].msg;
    pbar.style.width   = steps[i].pct + '%';
    i++;
    setTimeout(nextStep, 850);
  }

  function showEl(id, delay) {
    setTimeout(function () {
      var el = document.getElementById(id);
      if (el) el.classList.add('show');
    }, delay);
  }

  function showReveal() {
    document.getElementById('loader').style.display  = 'none';
    document.getElementById('reveal').style.display  = 'block';
    showEl('h1',     80);
    showEl('petals', 300);
    showEl('f1',     600);
    showEl('fl1',    950);
    showEl('f2',     1050);
    showEl('fl2',    1400);
    showEl('f3',     1500);
    showEl('fl3',    1850);
    showEl('fact1',  2300);
    showEl('fact2',  3100);
    showEl('h2',     3900);
  }

  nextStep();
</script>

</body>
</html>
